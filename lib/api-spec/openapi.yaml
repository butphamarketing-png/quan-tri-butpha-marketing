components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    # ── CUSTOMER ──────────────────────────────────────────────────────────
    Customer:
      type: object
      required: [id, name, phone, email, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
    CustomerInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        notes: { type: string }
    CustomerUpdate:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        notes: { type: string }
    CustomerList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Customer" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # ── SERVICE ───────────────────────────────────────────────────────────
    Service:
      type: object
      required: [id, name, type, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string }
        description: { type: ["string", "null"] }
        createdAt: { type: string }
    ServiceInput:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string }
        description: { type: string }
    ServiceUpdate:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        description: { type: string }
    ServiceList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Service" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # ── CONTRACT ──────────────────────────────────────────────────────────
    Contract:
      type: object
      required: [id, code, customerId, customerName, totalValue, status, startDate, createdAt]
      properties:
        id: { type: integer }
        code: { type: string }
        customerId: { type: integer }
        customerName: { type: string }
        serviceId: { type: ["integer", "null"] }
        serviceName: { type: ["string", "null"] }
        totalValue: { type: number }
        paidAmount: { type: number }
        remainingAmount: { type: number }
        status: { type: string }
        startDate: { type: string }
        endDate: { type: ["string", "null"] }
        dueDate: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
    ContractInput:
      type: object
      required: [code, customerId, totalValue, startDate, status]
      properties:
        code: { type: string }
        customerId: { type: integer }
        serviceId: { type: integer }
        totalValue: { type: number }
        status: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        dueDate: { type: string }
        notes: { type: string }
    ContractUpdate:
      type: object
      properties:
        code: { type: string }
        customerId: { type: integer }
        serviceId: { type: integer }
        totalValue: { type: number }
        status: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        dueDate: { type: string }
        notes: { type: string }
    ContractList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Contract" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # ── SUPPLIER ──────────────────────────────────────────────────────────
    Supplier:
      type: object
      required: [id, name, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
    SupplierInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        type: { type: string }
        notes: { type: string }
    SupplierUpdate:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        type: { type: string }
        notes: { type: string }
    SupplierList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Supplier" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # ── RECEIPT (Phiếu Thu) ───────────────────────────────────────────────
    Receipt:
      type: object
      required: [id, code, customerId, customerName, amount, paymentMethod, receiptDate, createdAt]
      properties:
        id: { type: integer }
        code: { type: string }
        customerId: { type: integer }
        customerName: { type: string }
        contractId: { type: ["integer", "null"] }
        contractCode: { type: ["string", "null"] }
        serviceId: { type: ["integer", "null"] }
        serviceName: { type: ["string", "null"] }
        amount: { type: number }
        paymentMethod: { type: string }
        receiptDate: { type: string }
        createdBy: { type: string }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
    ReceiptInput:
      type: object
      required: [customerId, amount, paymentMethod, receiptDate]
      properties:
        customerId: { type: integer }
        contractId: { type: integer }
        serviceId: { type: integer }
        amount: { type: number }
        paymentMethod: { type: string }
        receiptDate: { type: string }
        createdBy: { type: string }
        notes: { type: string }
    ReceiptUpdate:
      type: object
      properties:
        customerId: { type: integer }
        contractId: { type: integer }
        serviceId: { type: integer }
        amount: { type: number }
        paymentMethod: { type: string }
        receiptDate: { type: string }
        createdBy: { type: string }
        notes: { type: string }
    ReceiptList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Receipt" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # ── EXPENSE (Phiếu Chi) ───────────────────────────────────────────────
    Expense:
      type: object
      required: [id, code, category, amount, expenseDate, createdAt]
      properties:
        id: { type: integer }
        code: { type: string }
        supplierId: { type: ["integer", "null"] }
