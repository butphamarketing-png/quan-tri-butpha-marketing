openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Bứt Phá Marketing ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: customers
  - name: services
  - name: contracts
  - name: suppliers
  - name: receipts
  - name: expenses
  - name: accounts-receivable
  - name: accounts-payable
  - name: dashboard
  - name: reports
  - name: audit-logs

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── CUSTOMERS ──────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerList"
    post:
      operationId: createCustomer
      tags: [customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── SERVICES ───────────────────────────────────────────────────────────
  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List services
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceList"
    post:
      operationId: createService
      tags: [services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    patch:
      operationId: updateService
      tags: [services]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── CONTRACTS ──────────────────────────────────────────────────────────
  /contracts:
    get:
      operationId: listContracts
      tags: [contracts]
      summary: List contracts
      parameters:
        - in: query
          name: customerId
          schema: { type: integer }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractList"
    post:
      operationId: createContract
      tags: [contracts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"

  /contracts/{id}:
    get:
      operationId: getContract
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
    patch:
      operationId: updateContract
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
    delete:
      operationId: deleteContract
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── SUPPLIERS ──────────────────────────────────────────────────────────
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List suppliers
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierList"
    post:
      operationId: createSupplier
      tags: [suppliers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── RECEIPTS (Phiếu Thu) ───────────────────────────────────────────────
  /receipts:
    get:
      operationId: listReceipts
      tags: [receipts]
      summary: List receipts
      parameters:
        - in: query
          name: customerId
          schema: { type: integer }
        - in: query
          name: contractId
          schema: { type: integer }
        - in: query
          name: serviceId
          schema: { type: integer }
        - in: query
          name: fromDate
          schema: { type: string, format: date }
        - in: query
          name: toDate
          schema: { type: string, format: date }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptList"
    post:
      operationId: createReceipt
      tags: [receipts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"

  /receipts/{id}:
    get:
      operationId: getReceipt
      tags: [receipts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"
    patch:
      operationId: updateReceipt
      tags: [receipts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"
    delete:
      operationId: deleteReceipt
      tags: [receipts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── EXPENSES (Phiếu Chi) ───────────────────────────────────────────────
  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses
      parameters:
        - in: query
          name: supplierId
          schema: { type: integer }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: serviceId
          schema: { type: integer }
        - in: query
          name: fromDate
          schema: { type: string, format: date }
        - in: query
          name: toDate
          schema: { type: string, format: date }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseList"
    post:
      operationId: createExpense
      tags: [expenses]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    get:
      operationId: getExpense
      tags: [expenses]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    patch:
      operationId: updateExpense
      tags: [expenses]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── ACCOUNTS RECEIVABLE (Công Nợ Phải Thu) ────────────────────────────
  /accounts-receivable:
    get:
      operationId: listAccountsReceivable
      tags: [accounts-receivable]
      summary: List accounts receivable
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [paid, unpaid, overdue] }
        - in: query
          name: customerId
          schema: { type: integer }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsReceivableList"

  # ── ACCOUNTS PAYABLE (Công Nợ Phải Trả) ──────────────────────────────
  /accounts-payable:
    get:
      operationId: listAccountsPayable
      tags: [accounts-payable]
      summary: List accounts payable
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [paid, unpaid] }
        - in: query
          name: supplierId
          schema: { type: integer }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsPayableList"

  # ── DASHBOARD ──────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Financial dashboard summary
      parameters:
        - in: query
          name: month
          schema: { type: integer }
        - in: query
          name: year
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/revenue-chart:
    get:
      operationId: getRevenueChart
      tags: [dashboard]
      summary: Revenue, expense, profit chart data for last 12 months
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyFinancial"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent receipts and expenses
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivity"

  # ── REPORTS ────────────────────────────────────────────────────────────
  /reports/revenue:
    get:
      operationId: getRevenueReport
      tags: [reports]
      summary: Revenue report
      parameters:
        - in: query
          name: period
          schema: { type: string, enum: [monthly, quarterly, yearly] }
        - in: query
          name: year
          schema: { type: integer }
        - in: query
          name: serviceType
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReport"

  /reports/expenses:
    get:
      operationId: getExpenseReport
      tags: [reports]
      summary: Expense report
      parameters:
        - in: query
          name: period
          schema: { type: string, enum: [monthly, quarterly, yearly] }
        - in: query
          name: year
          schema: { type: integer }
        - in: query
          name: category
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseReport"

  /reports/profit:
    get:
      operationId: getProfitReport
      tags: [reports]
      summary: Profit report
      parameters:
        - in: query
          name: period
          schema: { type: string, enum: [monthly, quarterly, yearly] }
        - in: query
          name: year
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitReport"

  /reports/cash-flow:
    get:
      operationId: getCashFlowReport
      tags: [reports]
      summary: Cash flow report
      parameters:
        - in: query
          name: fromDate
          schema: { type: string, format: date }
        - in: query
          name: toDate
          schema: { type: string, format: date }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashFlowReport"

  /reports/by-customer:
    get:
      operationId: getCustomerReport
      tags: [reports]
      summary: Report by customer
      parameters:
        - in: query
          name: year
          schema: { type: integer }
        - in: query
          name: month
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerReportItem"

  /reports/by-service:
    get:
      operationId: getServiceReport
      tags: [reports]
      summary: Report by service type
      parameters:
        - in: query
          name: year
          schema: { type: integer }
        - in: query
          name: month
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceReportItem"

  # ── AUDIT LOGS ─────────────────────────────────────────────────────────
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit-logs]
      summary: List audit logs
      parameters:
        - in: query
          name: entityType
          schema: { type: string }
        - in: query
          name: entityId
          schema: { type: integer }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: fromDate
          schema: { type: string, format: date }
        - in: query
          name: toDate
          schema: { type: string, format: date }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    # ── CUSTOMER ──────────────────────────────────────────────────────────
    Customer:
      type: object
      required: [id, name, phone, email, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
    CustomerInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        notes: { type: string }
    CustomerUpdate:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        notes: { type: string }
    CustomerList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Customer" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # ── SERVICE ───────────────────────────────────────────────────────────
    Service:
      type: object
      required: [id, name, type, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string }
        description: { type: ["string", "null"] }
        createdAt: { type: string }
    ServiceInput:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string }
        description: { type: string }
    ServiceUpdate:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        description: { type: string }
    ServiceList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Service" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # ── CONTRACT ──────────────────────────────────────────────────────────
    Contract:
      type: object
      required: [id, code, customerId, customerName, totalValue, status, startDate, createdAt]
      properties:
        id: { type: integer }
        code: { type: string }
        customerId: { type: integer }
        customerName: { type: string }
        serviceId: { type: ["integer", "null"] }
        serviceName: { type: ["string", "null"] }
        totalValue: { type: number }
        paidAmount: { type: number }
        remainingAmount: { type: number }
        status: { type: string }
        startDate: { type: string }
        endDate: { type: ["string", "null"] }
        dueDate: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
    ContractInput:
      type: object
      required: [code, customerId, totalValue, startDate, status]
      properties:
        code: { type: string }
        customerId: { type: integer }
        serviceId: { type: integer }
        totalValue: { type: number }
        status: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        dueDate: { type: string }
        notes: { type: string }
    ContractUpdate:
      type: object
      properties:
        code: { type: string }
        customerId: { type: integer }
        serviceId: { type: integer }
        totalValue: { type: number }
        status: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        dueDate: { type: string }
        notes: { type: string }
    ContractList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Contract" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # ── SUPPLIER ──────────────────────────────────────────────────────────
    Supplier:
      type: object
      required: [id, name, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
    SupplierInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        type: { type: string }
        notes: { type: string }
    SupplierUpdate:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        type: { type: string }
        notes: { type: string }
    SupplierList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Supplier" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # ── RECEIPT (Phiếu Thu) ───────────────────────────────────────────────
